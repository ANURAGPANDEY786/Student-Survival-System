<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PG Details</title>

  <link rel="stylesheet" href="../assets/css/dashboard.css">

  <style>
   body{
  margin:0;
  padding:0;
  background:#0f172a;
  color:white;
  font-family: Arial, sans-serif;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 14px;
}

/* MAIN CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:#111827;
  border-radius:14px;
  padding:20px;
  border:1px solid #1f2937;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* FLEX LAYOUT */
.flex{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.left{
  flex:1.2;
  min-width:300px;
}

.right{
  flex:1;
  min-width:260px;
}

/* IMAGE */
.main-img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:12px;
}

/* INFO ROW */
.info-row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  border-bottom:1px solid #1f2937;
  padding-bottom:6px;
}

/* BUTTONS */
.btn{
  padding:10px 14px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

.btn:hover{
  opacity:0.85;
}

.primary{ background:#22c55e; color:white; }
.blue{ background:#3b82f6; color:white; }
.red{ background:#ef4444; color:white; }

/* TABS */
.tabs{
  display:flex;
  gap:20px;
  margin-top:20px;
  border-bottom:1px solid #1f2937;
}

.tab{
  padding:10px;
  cursor:pointer;
  font-weight:bold;
  opacity:0.7;
}

.tab:hover{
  opacity:1;
}

.active{
  color:#22c55e;
  border-bottom:3px solid #22c55e;
  opacity:1;
}

/* BADGES */
.pill{
  padding:4px 10px;
  border-radius:999px;
  font-weight:bold;
  font-size:12px;
}

.pending{ background:#334155; color:#fff; }
.warning{ background:#facc15; color:#000; }
.critical{ background:#ef4444; color:#fff; }

.riskSafe{ background:#22c55e; color:#000; }
.riskWarn{ background:#facc15; color:#000; }
.riskHigh{ background:#ef4444; color:#fff; }

/* COLLAPSIBLE */
.sectionBtn{
  width:100%;
  text-align:left;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  background:#111827;
  color:#fff;
  border:1px solid #1f2937;
  cursor:pointer;
  font-weight:bold;
}

.sectionBox{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:#020617;
  border:1px solid #1f2937;
}

/* FORM INPUTS */
input, select, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  outline:none;
  background:#020617;
  color:white;
  border:1px solid #1f2937;
}

input::placeholder, textarea::placeholder{
  color:#94a3b8;
}

/* REVIEW / COMPLAINT CARDS */
.review-card{
  margin-bottom:10px;
  padding:10px;
  background:#020617;
  border-radius:10px;
  border:1px solid #1f2937;
}

/* RESPONSIVE */
@media(max-width:768px){
  .flex{
    flex-direction:column;
  }

  .main-img{
    height:200px;
  }
}
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>

<body>


<div style="display:flex; justify-content:space-between; align-items:center; padding:10px 14px;">
  <div id="who" style="opacity:0.9;">👤 ...</div>
  <button onclick="logout()"
    style="padding:8px 12px; border-radius:8px; background:#ef4444; color:white; border:none; cursor:pointer;">
    Logout
  </button>
</div>


<div id="detail-root"></div>

<script>

  async function requireLogin() {
  const res = await fetch("../backend/auth/me.php");
  const me = await res.json();

  if (!me.loggedIn) {
    const cur = "pg-detail.html" + window.location.search;
    window.location.href = "login.html?next=" + encodeURIComponent(cur);
    return null;
  }
  return me;
}


  fetch("../backend/auth/me.php").then(r=>r.json()).then(me=>{
  if(!me.loggedIn){
    const cur = "pg-detail.html" + window.location.search;
    window.location.href = "login.html?next=" + encodeURIComponent(cur);
  }
});

const { useState, useEffect } = React;
const params = new URLSearchParams(window.location.search);
const pgId = params.get("id");

function CollapsibleSection({ title, children, defaultOpen=false }) {
  const [open, setOpen] = React.useState(defaultOpen);

  return React.createElement(
    "div",
    null,
    React.createElement(
      "button",
      { className:"sectionBtn", onClick:()=>setOpen(!open) },
      (open ? "▼ " : "► ") + title
    ),
    open ? React.createElement("div", { className:"sectionBox" }, children) : null
  );
}

function ReviewSection({ pgId }) {
  const [meta, setMeta] = React.useState(null);
  const [name, setName] = React.useState("");
  const [rating, setRating] = React.useState(5);
  const [text, setText] = React.useState("");
  const [issues, setIssues] = React.useState([]);

  function toggleIssue(v) {
    setIssues(prev => prev.includes(v) ? prev.filter(x=>x!==v) : [...prev, v]);
  }

  function load() {
    fetch("../backend/api/pg-review-list.php?pg_id=" + pgId)
      .then(r=>r.json())
      .then(setMeta);
  }

  React.useEffect(load, []);

  function submit(e) {
    e.preventDefault();
    const fd = new FormData();
    fd.append("pg_id", pgId);
    fd.append("student_name", name);
    fd.append("rating", rating);
    fd.append("review_text", text);
    issues.forEach(i => fd.append("issues[]", i));

    fetch("../backend/api/pg-review-add.php", { method:"POST", body: fd })
      .then(r=>r.json())
      .then(res => {
        if (res.ok) {
          setName(""); setText(""); setIssues([]); setRating(5);
          load();
        } else {
          alert("Failed to submit review");
        }
      });
  }

  if (!meta) return React.createElement("p", null, "Loading reviews...");

  return React.createElement(
    "div",
    null,

    React.createElement("p", null, "Average: " + meta.avg_rating + " / 5  (" + meta.total_reviews + " reviews)"),
    React.createElement("p", null, "Top Problems: ",
      meta.top_issues.length ? meta.top_issues.map(x => x.issue + " (" + x.c + ")").join(", ") : "None"
    ),

    React.createElement("hr", { style:{ borderColor:"#333" } }),

    React.createElement("h4", null, "Add Review"),
    React.createElement("form", { onSubmit: submit },

      React.createElement("input", {
        placeholder:"Your Name",
        value:name,
        onChange:e=>setName(e.target.value),
        required:true,
        style:{ width:"100%", padding:"10px", marginBottom:"10px", borderRadius:"8px" }
      }),

      React.createElement("select", {
        value:rating,
        onChange:e=>setRating(e.target.value),
        style:{ width:"100%", padding:"10px", marginBottom:"10px", borderRadius:"8px" }
      },
        [5,4,3,2,1].map(n => React.createElement("option", { key:n, value:n }, n))
      ),

      React.createElement("textarea", {
        placeholder:"Short review (optional)",
        value:text,
        onChange:e=>setText(e.target.value),
        style:{ width:"100%", padding:"10px", marginBottom:"10px", borderRadius:"8px" }
      }),

      React.createElement("div", null,
        ["water","power","food","safety","noise"].map(tag =>
          React.createElement("label", { key:tag, style:{ marginRight:"10px" } },
            React.createElement("input", {
              type:"checkbox",
              checked: issues.includes(tag),
              onChange: ()=>toggleIssue(tag)
            }),
            " " + tag
          )
        )
      ),

      React.createElement("button", {
        type:"submit",
        style:{
          marginTop:"10px",
          padding:"10px",
          borderRadius:"8px",
          background:"#22c55e",
          border:"none",
          cursor:"pointer",
          fontWeight:"bold"
        }
      }, "Submit Review")
    ),

    React.createElement("hr", { style:{ borderColor:"#333", marginTop:"15px" } }),

    React.createElement("h4", null, "Recent Reviews"),
    meta.reviews.length
      ? meta.reviews.map(r =>
          React.createElement("div", { key:r.id, style:{ marginBottom:"10px", padding:"10px", background:"#111", borderRadius:"10px" } },
            React.createElement("b", null, r.student_name + " ⭐" + r.rating),
            React.createElement("div", null, r.review_text || "(no text)")
          )
        )
      : React.createElement("p", null, "No reviews yet.")
  );
}

function PGComplaints({ pgId }) {
  const [list, setList] = React.useState([]);
  const [student, setStudent] = React.useState("");
  const [issue, setIssue] = React.useState("water");
  const [message, setMessage] = React.useState("");

  function load() {
    fetch("../backend/api/pg-complaint-list.php?pg_id=" + pgId)
      .then(r => r.json())
      .then(setList);
  }
  React.useEffect(load, []);

  function sevClass(s){
    if(s==="Critical") return "pill critical";
    if(s==="Warning") return "pill warning";
    return "pill pending";
  }

  function submit(e){
    e.preventDefault();
    const fd = new FormData();
    fd.append("pg_id", pgId);
    fd.append("student_name", student);
    fd.append("issue", issue);
    fd.append("message", message);

    fetch("../backend/api/pg-complaint-add.php", { method:"POST", body: fd })
      .then(r=>r.json())
      .then(res=>{
        if(res.ok){
          setMessage("");
          load();
        } else alert("Failed to submit complaint");
      });
  }

  function confirm(id){
    if(!student){ alert("Enter your name first"); return; }
    const fd = new FormData();
    fd.append("complaint_id", id);
    fd.append("student_name", student);

    fetch("../backend/api/pg-complaint-confirm.php", { method:"POST", body: fd })
      .then(r=>r.json())
      .then(res=>{
        if(res.ok) load();
        else alert(res.msg || "Already confirmed");
      });
  }

  return React.createElement(
    "div",
    null,

    React.createElement("h4", null, "Add PG Complaint"),
    React.createElement("form", { onSubmit: submit },

      React.createElement("input", {
        placeholder:"Your Name (same name used for confirm)",
        value: student,
        onChange: e=>setStudent(e.target.value),
        required:true,
        style:{ width:"100%", padding:"10px", borderRadius:"8px", marginBottom:"10px" }
      }),

      React.createElement("select", {
        value: issue,
        onChange: e=>setIssue(e.target.value),
        style:{ width:"100%", padding:"10px", borderRadius:"8px", marginBottom:"10px" }
      },
        ["water","power","food","hygiene","security","noise"].map(x =>
          React.createElement("option", { key:x, value:x }, x)
        )
      ),

      React.createElement("textarea", {
        placeholder:"Describe the PG issue",
        value: message,
        onChange: e=>setMessage(e.target.value),
        required:true,
        style:{ width:"100%", padding:"10px", borderRadius:"8px" }
      }),

      React.createElement("button", {
        type:"submit",
        style:{
          marginTop:"10px",
          padding:"10px",
          borderRadius:"8px",
          background:"#22c55e",
          border:"none",
          cursor:"pointer",
          fontWeight:"bold"
        }
      }, "Submit PG Complaint")
    ),

    React.createElement("hr", { style:{ borderColor:"#333", marginTop:"15px" } }),

    React.createElement("h4", null, "Live Complaints"),
    list.length
      ? list.map(item =>
          React.createElement(
            "div",
            { key:item.id, style:{ marginBottom:"12px", padding:"10px", borderRadius:"10px", background:"#111" } },

            React.createElement("div", null,
              React.createElement("b", null, item.issue.toUpperCase()),
              " ",
              React.createElement("span", { className: sevClass(item.severity) }, item.severity)
            ),

            React.createElement("div", null, item.message || "(no details)"),
            React.createElement("div", { style:{ marginTop:"6px", opacity:0.9 } },
              "By: " + item.student_name + " | Confirms: " + item.confirms
            ),

            React.createElement("button", {
              onClick: ()=>confirm(item.id),
              style:{ marginTop:"8px", padding:"8px 12px", borderRadius:"8px", cursor:"pointer" }
            }, "✅ Confirm")
          )
        )
      : React.createElement("p", null, "No PG complaints yet.")
  );
}

function PGDetail() {
  const [pg, setPg] = useState(null);
  const [risk, setRisk] = useState(null);
  const [tab, setTab] = useState("details");

  useEffect(() => {
    fetch("../backend/api/pg-detail.php?id=" + pgId)
      .then(res => res.json())
      .then(setPg);

    fetch("../backend/api/pg-list-risk.php")
      .then(res => res.json())
      .then(list => {
        const found = list.find(x => String(x.id) === String(pgId));
        setRisk(found || null);
      });
  }, []);

  if (!pg) return React.createElement("h3", null, "Loading...");

  return React.createElement("div", { className:"container" },

    React.createElement("div", { className:"card" },

      // TOP SECTION
      React.createElement("div", { className:"flex" },

        // LEFT IMAGE
        React.createElement("div", { className:"left" },
          pg.photo && React.createElement("img", {
            src:"../uploads/pg/" + pg.photo,
            className:"main-img"
          })
        ),

        // RIGHT DETAILS
        React.createElement("div", { className:"right" },

          React.createElement("h2", null,
            pg.name,
            risk && React.createElement("span", {
              style:{
                marginLeft:"10px",
                padding:"4px 10px",
                borderRadius:"20px",
                background: risk.risk_level==="High Risk" ? "#ef4444" :
                           risk.risk_level==="Warning" ? "#facc15" : "#22c55e",
                color:"#000",
                fontSize:"12px"
              }
            }, risk.risk_level)
          ),

          React.createElement("p", null, "📍 " + pg.address),

          React.createElement("div", { className:"info-row" },
            React.createElement("span", null, "Price"),
            React.createElement("b", null, "₹" + pg.price)
          ),

          React.createElement("div", { className:"info-row" },
            React.createElement("span", null, "Distance"),
            React.createElement("b", null, pg.distance + " km")
          ),

          React.createElement("div", { className:"info-row" },
            React.createElement("span", null, "Type"),
            React.createElement("b", null, pg.type)
          ),

          React.createElement("button", {
            className:"btn primary",
            onClick:()=>window.location.href="tel:"+pg.phone
          }, "📞 Contact Owner"),

          React.createElement("br"),
          React.createElement("br"),

          React.createElement("a", {
            href:"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(pg.address),
            target:"_blank",
            className:"btn blue"
          }, "View on Map")
        )
      ),

      // TABS
      React.createElement("div", { className:"tabs" },
        ["details","reviews","complaints"].map(t =>
          React.createElement("div", {
            key:t,
            className:"tab " + (tab===t ? "active":""),
            onClick:()=>setTab(t)
          }, t.toUpperCase())
        )
      ),

      // TAB CONTENT
      React.createElement("div", { style:{ marginTop:"20px" } },

        tab==="details" && React.createElement("div", null,
          React.createElement("p", null, "✅ Facilities: " + (pg.facilities || "Not added")),
          React.createElement("p", null, "📜 Rules: " + (pg.rules || "Not added"))
        ),

        tab==="reviews" &&
          React.createElement(ReviewSection, { pgId }),

        tab==="complaints" &&
          React.createElement(PGComplaints, { pgId })
      )
    )
  );
}

requireLogin().then(me => {
  if (!me) return;

  document.getElementById("who").textContent = "👤 " + me.student_name;

  ReactDOM.createRoot(document.getElementById("detail-root"))
    .render(React.createElement(PGDetail));
});


function logout(){
  fetch("../backend/auth/logout.php")
    .then(()=> window.location.href = "index.html");
}


</script>

</body>
</html>
